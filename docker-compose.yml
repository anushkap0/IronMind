services:
  backend:
    build: ./backend
    container_name: ironmind-backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - ./backend/.env
    environment:
      - FRONTEND_ORIGIN=http://localhost:5173
    volumes:
      - backend_data:/app/data
      - chroma_data:/app/chroma_data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: ironmind-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  chroma_data:
